services:
  app:
    image: oven/bun:1
    working_dir: /app
    volumes:
      - .:/app
      - pagebox-data:/data
      - bun-cache:/root/.bun
    ports: ["3000:3000"]
    environment:
      PORT: "3000"
      PAGEBOX_DATA_DIR: /data
      STORAGE_DRIVER: fs
      DB_DRIVER: sqlite
    command: sh -c "bun install && bun run dev"
volumes:
  pagebox-data: {}
  bun-cache: {}
