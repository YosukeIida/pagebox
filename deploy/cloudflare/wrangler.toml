name = "pagebox"
main = "../../src/entries/worker.ts"
# account_id は CLOUDFLARE_ACCOUNT_ID 環境変数から自動取得（wrangler.toml に直書きしない）
compatibility_date = "2024-09-23"
compatibility_flags = ["nodejs_compat"]

routes = [
  { pattern = "pagebox.iodine2.net", custom_domain = true },
  { pattern = "view.pagebox.iodine2.net", custom_domain = true }
]

# クライアント JS・CSS を Workers Assets として配信
# `bun run build:worker` で dist/static/ に生成してからデプロイ
[assets]
directory = "../../dist"
binding = "ASSETS"

[[d1_databases]]
binding = "DB"
database_name = "pagebox"
database_id = "a7f4472c-ec7e-4108-b431-e8223a744803"
migrations_dir = "migrations"

[vars]
ACCESS_TEAM_DOMAIN = "i2net.cloudflareaccess.com"
ACCESS_AUD = "4562908ad77043dc3e5b899bf2e0b28bd5efdc11c9faec799466a3cb566e61d6"
# account_id は wrangler が CLOUDFLARE_ACCOUNT_ID 環境変数から自動取得するため重複しないが
# Analytics SQL API・GraphQL API・Access Audit Logs API の呼び出し元として Worker が参照する
CLOUDFLARE_ACCOUNT_ID = "YOUR_ACCOUNT_ID"
# ダッシュボードを表示するメールアドレス（カンマ区切り）
# 本番では wrangler secret put ADMIN_EMAILS を使うことを推奨
ADMIN_EMAILS = ""

# OGP 画像キャッシュ用 KV（Feature 4 で使用）
[[kv_namespaces]]
binding = "OG_CACHE_KV"
id = "098954f448404ba68b3877a08489613c"

# レート制限（Cloudflare Workers Rate Limiting API）
# period は 10 または 60 秒のみサポート
# 5回/分 = バースト抑止として十分かつ通常利用を妨げない水準
[[ratelimits]]
name = "RATE_LIMITER"
namespace_id = "10001"
simple = { limit = 5, period = 60 }

[[r2_buckets]]
binding = "STORAGE"
bucket_name = "pagebox-blobs"

# Analytics Engine（閲覧・アップロードイベントの時系列記録）
[[analytics_engine_datasets]]
binding = "ANALYTICS"
dataset = "pagebox_events"

# resvg-wasm をビルド時にバンドル（動的インスタンス化は Workers で禁止）
[[rules]]
type = "CompiledWasm"
globs = ["**/*.wasm"]
